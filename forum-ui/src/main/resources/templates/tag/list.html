<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>标签列表 - 论坛</title>
    <link rel="stylesheet" href="/css/three/bootstrap.min.css">
    <link rel="stylesheet" href="/css/common.css">
</head>
<body>
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-12">
                <h2 class="mb-4">标签列表</h2>
                <div class="row">
                    <div th:each="tag : ${tags}" class="col-md-3 mb-3">
                        <div class="card">
                            <div class="card-body">
                                <h5 class="card-title" th:text="${tag.tagName}"></h5>
                                <p class="card-text">使用次数：[[${tag.count}]]</p>
                                <a href="#" class="btn btn-primary">查看相关文章</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="/js/jquery.min.js"></script>
    <script src="/js/bootstrap.min.js"></script>
</body>
</html>
