server:
  port: 8080
  servlet:
    session:
      timeout: 5m # 设置session的有效期为五分钟
  compression:
    enabled: true # 开启返回结果压缩，减少传输耗时
    min-response-size: 2KB
  shutdown: graceful # 优雅关闭，避免 AsynchronousCloseException
  tomcat:
    connection-timeout: 20000 # 连接超时时间
    threads:
      max: 200 # 最大工作线程数
      min-spare: 10 # 最小空闲线程数

spring:
  # 数据库连接配置
  datasource:
    url: jdbc:mysql://localhost:3306/tech_forum?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  devtools:
    livereload:
      enabled: true
    restart:
      enabled: true
  application:
    name: forum
  #  Spring Boot 2.4为了提升对Kubernetes的支持 将 spring.profiles 作废了
  #  profiles:
  #    active: dal,web,config,image
  # 替换上面作废的spring.profiels.actice配置参数
  config:
    import: optional:classpath:application-dal.yml,optional:classpath:application-web.yml,optional:classpath:application-config.yml,optional:classpath:application-image.yml,optional:classpath:application-email.yml,optional:classpath:application-rabbitmq.yml,optional:classpath:application-ai.yml,optional:classpath:application-pay.yml,optional:classpath:application-login.yml

  main:
    # 引入下面这个配置，主要是为了解决自定义实现的多数据源功能，自主注册的datasource替换默认的
    allow-bean-definition-overriding: true
    allow-circular-references: true
  # 优雅关闭超时时间
  lifecycle:
    timeout-per-shutdown-phase: 30s
  mvc:
    async:
      request-timeout:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
  liquibase:
    change-log: classpath:liquibase/master.xml
    enabled: true # 当实际使用的数据库不支持liquibase，如 mariadb 时，将这个参数设置为false
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 10MB


servlet:
  tomcat:
    max-swallow-size: -1 # 解决上传图片超过2MB之后，出现连接重置的问题

security:
  salt: ${PASSWORD_SALT:tech_forum}
  salt-index: 3

paicoding:
  sensitive: # 敏感词校验相关配置
    enable: true
    deny: # 自定义的敏感词，英文逗号分割
    allow: 国,制作,码,亚洲,中国,公司,简历,性,国研,鬼,国庆,用户,扑克,法,鲁迅,祖国,口,色,俄罗斯 # 自定义的非敏感词
  jwt:
    issuer: tech_forum
    secret: ${JWT_SECRET:}
    expire: 432000000
  openapi:
    app-ids: test-app
  ip-white-list: 0.0.0.0/0
  oc-login-redirect-url:

# 默认的数据库名
database:
  name: tech_forum

# mybatis 相关统一配置
mybatis-plus:
  configuration:
    #开启下划线转驼峰
    map-underscore-to-camel-case: true


# knife4j
knife4j:
  enable: true
  setting:
    language: zh-CN
  openapi:
    title: Tech Forum
    description: A Spring Boot + MyBatis-Plus + MySQL + Redis based community forum system with articles, comments, real-time chat, and AI assistant features.
    version: 1.0.0
    concat:
      - https://github.com
    license: Apache License 2.0
    license-url: https://www.apache.org/licenses/LICENSE-2.0
    email:
    group:
      admin:
        group-name: 后台接口分组
        api-rule: package
        api-rule-resources:
          - com.example.forum.web.admin
      front:
        group-name: 前台接口分组
        api-rule: package
        api-rule-resources:
          - com.example.forum.web.front

logging:
  level:
    com.example.forum.service.rank.service.impl.*: debug # 指定具体包下的日志输出级别
    org:
      springframework:
        web:
          servlet:
            handler.*: info # 定位为啥无妨访问swagger-ui时，可以把这个日志输出级别设置debug
      apache:
        tomcat:
          util:
            net: warn # 抑制 Tomcat NioEndpoint 的 AsynchronousCloseException 警告


# 监控相关配置
management:
  server:
    address: 127.0.0.1 # 设置为本地ip，防止远程访问该连接进行关闭服务
    port: 8999
  endpoints:
    web:
      exposure:
        include: "*"
  metrics:
    tags:
      application: ${spring.application.name}
  health:
    elasticsearch:
      enabled: false
    mail:
      enabled: false
    redis:
      enabled: false
    rabbit:
      enabled: false
