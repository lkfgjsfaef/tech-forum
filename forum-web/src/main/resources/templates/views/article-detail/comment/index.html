<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<body>
    <!-- 文章评论区片段 -->
    <div th:if="${vo.hotComment != null}" class="hot-comment" style="background: #fff8f0; border-left: 3px solid #ff8721; padding: 12px 16px; margin-bottom: 16px; border-radius: 4px;">
        <div style="font-size: 13px; color: #ff8721; margin-bottom: 6px;">🔥 热门评论</div>
        <div style="font-size: 15px;" th:text="${vo.hotComment.content}">热门评论内容</div>
        <div style="font-size: 12px; color: #999; margin-top: 4px;">
            <span th:text="${vo.hotComment.userName}">用户</span>
            <span th:text="${#dates.format(new java.util.Date(vo.hotComment.createTime * 1000), 'yyyy-MM-dd HH:mm')}">时间</span>
        </div>
    </div>

    <div style="margin-bottom: 10px; font-size: 15px; font-weight: bold;">
        评论 (<span th:text="${vo.topCommentTotal}">0</span>)
    </div>

    <div th:each="comment : ${vo.comments}" class="comment-item" style="padding: 12px 0; border-bottom: 1px solid #f0f0f0;">
        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 6px;">
            <img th:src="${comment.userAvatar != null and !comment.userAvatar.isEmpty() ? comment.userAvatar : '/img/default-avatar.png'}" src="/img/default-avatar.png" style="width: 32px; height: 32px; border-radius: 50%;" alt="">
            <span style="font-size: 14px; font-weight: 500;" th:text="${comment.userName}">用户</span>
            <span style="font-size: 12px; color: #999;" th:text="${#dates.format(new java.util.Date(comment.createTime * 1000), 'yyyy-MM-dd HH:mm')}">时间</span>
        </div>
        <div style="font-size: 14px; line-height: 1.6; margin-left: 40px;" th:text="${comment.content}">评论内容</div>

        <!-- 子评论 -->
        <div th:if="${comment.subComments != null and !comment.subComments.isEmpty()}" style="margin-left: 40px; margin-top: 8px; background: #f9f9f9; border-radius: 4px; padding: 8px 12px;">
            <div th:each="sub : ${comment.subComments}" style="padding: 6px 0; border-bottom: 1px solid #eee;">
                <div th:if="${!sub.id.equals(comment.id)}">
                    <span style="font-size: 13px; font-weight: 500; color: #ff8721;" th:text="${sub.userName}">用户</span>
                    <span style="font-size: 13px;" th:text="${sub.content}">回复内容</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
