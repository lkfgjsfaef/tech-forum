<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<body>
    <!-- 划线评论高亮片段 -->
    <div th:if="${id != null}" class="highlight-comment" style="background: #fff8f0; border-left: 3px solid #ff8721; padding: 8px 12px; margin: 8px 0; border-radius: 4px;">
        <div style="font-size: 14px;" th:text="${content}">评论内容</div>
        <div style="font-size: 12px; color: #999; margin-top: 4px;">
            <span th:text="${userName}">用户</span>
        </div>
    </div>
</body>
</html>
